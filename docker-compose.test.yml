# Spins up the dependencies the `pnpm test:integration` suite needs.
# Used both locally (developer) and as the spec for the CI services block.
#
#   docker compose -f docker-compose.test.yml up -d
#   pnpm test:integration
#   docker compose -f docker-compose.test.yml down -v

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: easy_front_test
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
