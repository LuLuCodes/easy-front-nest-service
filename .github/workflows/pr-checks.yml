name: PR Checks

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  # Bot PRs (release-please) — see ci.yml for the rationale.
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

jobs:
  semantic-pr-title:
    name: Semantic PR title
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request_target' ||
      (github.actor == 'github-actions[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            test
            chore
            perf
            ci
            build
            style
            revert

  size-label:
    name: PR size label
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request_target' ||
      (github.actor == 'github-actions[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: '20'
          s_label: 'size/s'
          s_max_size: '100'
          m_label: 'size/m'
          m_max_size: '500'
          l_label: 'size/l'
          l_max_size: '1000'
          xl_label: 'size/xl'
          fail_if_xl: 'false'
          message_if_xl: |
            This PR exceeds the recommended size of 1000 lines.
            Please consider splitting it into smaller PRs.
