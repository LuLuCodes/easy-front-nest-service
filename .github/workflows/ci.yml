name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # GITHUB_TOKEN-initiated PRs (release-please) don't fire pull_request.
  # pull_request_target does. Guarded to bot + same-repo so external
  # fork PRs never execute with secrets in scope.
  pull_request_target:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name != 'pull_request_target' ||
      (github.actor == 'github-actions[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test --coverage --passWithNoTests

      - name: E2E
        run: pnpm test:e2e --passWithNoTests

      - name: Build
        run: pnpm build

      - name: Entity-init smoke (catches SWC circular-import regressions)
        run: node -e "require('./api/entities/index.js'); console.log('entities OK')"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  integration-test:
    name: Integration (mysql + redis)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: easy_front_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: easy_front_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          # AppModule's bootstrap requires these to be present
          JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars-long
          TENANT_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: pnpm test:integration --passWithNoTests

      - name: Export OpenAPI spec
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: easy_front_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars-long
          TENANT_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: pnpm openapi:export

      - name: Upload OpenAPI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: openapi.json
          retention-days: 30
