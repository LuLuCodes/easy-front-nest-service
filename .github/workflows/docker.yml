name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - 'scripts/healthcheck.js'
      - '.github/workflows/docker.yml'
  # Mirror of ci.yml. Same path filter so we don't burn 4min on
  # release-please PRs that didn't touch anything dockerizable.
  pull_request_target:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - 'scripts/healthcheck.js'
      - '.github/workflows/docker.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build / Trivy / SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      security-events: write
    if: |
      github.event_name != 'pull_request_target' ||
      (github.actor == 'github-actions[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and (conditionally) push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' && github.event_name != 'pull_request_target' }}
          load: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Resolve scan target image
        id: image
        run: |
          # Trivy + Syft accept either a registry ref (push) or a local
          # tag (PR with load=true). Prefer the first metadata tag.
          REF=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      # Trivy releases are published as named releases but only some are
      # backed by git tags. Pinning to the master commit avoids that
      # mismatch; bump deliberately.
      - name: Trivy image scan (table; visible in logs)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # latest master
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: table
          exit-code: '0'

      - name: Trivy image scan (SARIF; HIGH,CRITICAL → fail)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # latest master
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          # In sarif mode the action expands `severity` to ALL so the
          # uploaded report contains every level for Code Scanning. We
          # need this flag to keep the gate restricted to HIGH/CRITICAL.
          limit-severities-for-sarif: true
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.ref }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30
