name: Feature Request
description: 提议一个新功能或改进
title: '[Feature]: '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个 feature 解决什么场景下的什么问题
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议的实现方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的备选方案

  - type: textarea
    id: additional
    attributes:
      label: 额外信息
