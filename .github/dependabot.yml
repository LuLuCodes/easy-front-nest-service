version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - 'typescript-eslint'
          - '@eslint/*'
      test:
        patterns:
          - 'jest'
          - 'ts-jest'
          - '@types/jest'
          - 'supertest'
          - '@types/supertest'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
