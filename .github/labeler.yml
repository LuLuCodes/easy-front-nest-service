ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - .husky/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - '**/*.md'

deps:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - pnpm-lock.yaml

config:
  - changed-files:
      - any-glob-to-any-file:
          - tsconfig*.json
          - eslint.config.mjs
          - .prettierrc
          - .editorconfig
          - nest-cli.json

src:
  - changed-files:
      - any-glob-to-any-file:
          - src/**

tests:
  - changed-files:
      - any-glob-to-any-file:
          - test/**
          - '**/*.spec.ts'
          - '**/*.e2e-spec.ts'

deploy:
  - changed-files:
      - any-glob-to-any-file:
          - dockerfile
          - .dockerignore
          - scripts/**
